apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-standard-labels
spec:
  validationFailureAction: Enforce
  rules:
    - name: check-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - Service
      validate:
        message: "app and owner labels are required."
        pattern:
          metadata:
            labels:
              app: "?*"
              owner: "?*"