apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: team-a-dev
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: sample-inference
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 300m
configMapGenerator:
  - name: sample-inference-config
    behavior: merge
    literals:
      - APP_ENV=dev
