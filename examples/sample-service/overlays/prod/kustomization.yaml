apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: team-a-prod
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: sample-inference
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
configMapGenerator:
  - name: sample-inference-config
    behavior: merge
    literals:
      - APP_ENV=prod
